user nginx;
worker_processes auto;
pid /run/nginx/nginx.pid;

error_log /dev/stderr warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_tokens off;

    access_log /dev/stdout;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        application/manifest+json
        image/svg+xml
        font/woff
        font/woff2;

    # Rate limiting: 30 requests/second per IP for SSR endpoints
    limit_req_zone $binary_remote_addr zone=ssr:10m rate=30r/s;

    upstream nodejs {
        server 127.0.0.1:3001;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Emit relative Location headers in redirects so the browser resolves
        # them against its own origin. Without this, nginx constructs an absolute
        # URL from the Host header it receives (which may include :3000 when
        # running behind a reverse proxy), leaking the internal port.
        absolute_redirect off;

        # Default root: built client assets (JS/CSS bundles, fonts, public files)
        root /app/client;

        # Health check — answered directly by Nginx, no Node.js hit
        location = /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Immutable hashed JS/CSS bundles — safe to cache forever
        location ^~ /assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Content-Type-Options nosniff always;
            try_files $uri =404;
        }

        # Font files (also hashed filenames → immutable)
        location ^~ /fonts/ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Content-Type-Options nosniff always;
            try_files $uri =404;
        }

        # Other static files (icons, favicons, etc.)
        location ^~ /static/ {
            add_header Cache-Control "public, max-age=604800" always;
            add_header X-Content-Type-Options nosniff always;
            try_files $uri =404;
        }

        # Mirrored photography variants generated by zipline-sync. Filenames
        # include a content hash, so these are safe to cache indefinitely.
        location ^~ /photos/ {
            alias /data/photography/files/;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Content-Type-Options nosniff always;
        }

        # Content-addressed OG images generated after deployment. A new image
        # may briefly be absent while the one-shot worker is running.
        location ^~ /og/ {
            root /data;
            try_files $uri =404;
            error_page 404 = /_og-fallback.jpg;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Content-Type-Options nosniff always;
        }

        # Do not cache the fallback under a content-addressed URL: a later
        # request must be able to retrieve the generated image.
        location = /_og-fallback.jpg {
            internal;
            root /app/client;
            try_files /avatar.jpg =404;
            add_header Cache-Control "no-store" always;
            add_header X-Content-Type-Options nosniff always;
        }

        # Legacy URL redirects — handled before Node.js to avoid SSR errors
        location = /blog/feed      { return 301 /feed.xml; }
        location = /blog           { return 301 /lab; }
        location = /blog/          { return 301 /lab; }
        location ~ ^/blog/(.+)$    { return 301 /lab/$1; }

        location = /portfolio      { return 301 /lab; }
        location = /portfolio/     { return 301 /lab; }
        location ~ ^/portfolio/(.+)$ { return 301 /lab/$1; }

        location = /clients        { return 301 /lab; }
        location = /clients/       { return 301 /lab; }
        location ~ ^/clients/(.+)$ { return 301 /lab/$1; }

        location = /labs           { return 301 /lab; }
        location = /labs/          { return 301 /lab; }
        location ~ ^/labs/(.+)$    { return 301 /lab/$1; }

        location = /snippets       { return 301 /lab; }
        location = /snippets/      { return 301 /lab; }
        location ~ ^/snippets/(.+)$ { return 301 /lab/$1; }

        location = /projects       { return 301 /lab; }
        location = /projects/      { return 301 /lab; }
        location ~ ^/projects/(.+)$ { return 301 /lab/$1; }

        location ~ ^/photography/photo/ { return 302 /photography; }

        # Everything else: try static client files, fall back to SSR
        location / {
            try_files $uri @ssr;
        }

        # SSR / API — proxied to Node.js with full security headers
        location @ssr {
            limit_req zone=ssr burst=50 nodelay;
            limit_req_status 429;

            # Prevent browsers from caching HTML documents. Without this, a browser
            # may serve a stale HTML page (referencing old hashed asset filenames)
            # after a redeploy, causing 404s for JS/CSS bundles that no longer exist.
            add_header Cache-Control "no-cache, must-revalidate" always;

            proxy_pass http://nodejs;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;

            # Disable response buffering so SSR streaming reaches the client immediately.
            # Without this, Nginx would buffer the full response before sending chunks.
            proxy_buffering off;

            # Security headers applied to all SSR/API responses
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' *.youtube.com plausible.koenvangilst.nl; script-src-elem 'self' blob: 'unsafe-inline' plausible.koenvangilst.nl; child-src 'self' blob: *.youtube.com; style-src 'self' 'unsafe-inline'; img-src * blob: data:; media-src i.imgur.com github.com *.s3.amazonaws.com *.koenvangilst.nl; connect-src *; font-src 'self'; frame-src 'self' svelte.dev codesandbox.io tetris-time.koenvangilst.nl voronoi-virus.koenvangilst.nl dancing-mosquitoes.koenvangilst.nl pong-wars.koenvangilst.nl purple-rain.koenvangilst.nl particle-life.koenvangilst.nl time-flies.koenvangilst.nl aarde.koenvangilst.nl rock-paper-scissors.koenvangilst.nl stacked-game-of-life.koenvangilst.nl" always;
            add_header Referrer-Policy "origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=()" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options nosniff always;
            add_header X-DNS-Prefetch-Control "on" always;
        }
    }
}
